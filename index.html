<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#1F4D3F" />
    <title>Feraiz.com | Ayet Bazlı Miras Hesaplayıcı</title>

    <!-- Favicon (adalet terazisi) -->
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />

    <!-- Tema: React yüklenmeden uygula (açılışta titreme olmasın) -->
    <script>
      try {
        var t = localStorage.getItem("feraiz.theme");
        if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>

    <!-- Google Fonts: Arabic (Noto Naskh) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet" />

    <!-- Font Awesome (ikonlar için) — integrity/crossorigin kullanılmıyor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <!-- AdSense (client ID'yi değiştirin) -->
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1688340004546677" crossorigin="anonymous"></script>

    <!-- Sayfa açıklaması -->
    <meta
      name="description"
      content="Feraiz: Kur'an'da belirlenmiş miras payları ve Allah'ın koyduğu adil sınırlar - ayet ve meallere dayalı miras hesaplayıcı."
    />

    <!-- Canonical + hreflang (çok dilli) + Open Graph + Twitter -->
    <link rel="canonical" href="https://feraiz.com/" />
    <link rel="alternate" hreflang="tr" href="https://feraiz.com/" />
    <link rel="alternate" hreflang="en" href="https://feraiz.com/?lang=en" />
    <link rel="alternate" hreflang="ar" href="https://feraiz.com/?lang=ar" />
    <link rel="alternate" hreflang="de" href="https://feraiz.com/?lang=de" />
    <link rel="alternate" hreflang="fr" href="https://feraiz.com/?lang=fr" />
    <link rel="alternate" hreflang="x-default" href="https://feraiz.com/" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Feraiz.com — Ayet Bazlı Miras Hesaplayıcı" />
    <meta property="og:description" content="Kur'an'da belirlenmiş miras paylarına dayalı hesaplayıcı." />
    <meta property="og:url" content="https://feraiz.com/" />
    <meta property="og:site_name" content="Feraiz.com" />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Feraiz.com",
      "url": "https://feraiz.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://feraiz.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body class="bg-light text-primary">
    <div id="root"></div>

    <!-- Vite giriş noktası -->
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
